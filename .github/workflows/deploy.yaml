name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/tecostudio/search
  NS: mcsearch

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Tracked deployment: shows up in the repo's Environments / Deployments UI
    # with a clickable link to the live site, and is marked success/failure
    # based on this job's result.
    environment:
      name: production
      url: https://search.tecostudio.cn
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to cluster
        if: ${{ env.KUBECONFIG_B64 != '' }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          kubectl -n "$NS" apply -f k8s/app.yaml
          kubectl -n "$NS" set image deployment/web web=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n "$NS" rollout status deployment/web --timeout=180s
