<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110" fill="none" role="img" aria-label="MC Search">
  <!-- top: grass-green blocks -->
  <rect x="4"  y="4" width="18" height="18" fill="#5a9e3a"/>
  <rect x="26" y="4" width="18" height="18" fill="#6db84b"/>
  <rect x="48" y="4" width="18" height="18" fill="#4f8f34"/>
  <rect x="70" y="4" width="18" height="18" fill="#79c95c"/>

  <!-- left: dirt-brown blocks -->
  <rect x="4" y="30" width="18" height="18" fill="#7d5c3c"/>
  <rect x="4" y="58" width="18" height="18" fill="#6c4f33"/>

  <!-- right: dirt-brown + stone-gray -->
  <rect x="92" y="30" width="14" height="18" fill="#7d5c3c"/>
  <rect x="92" y="54" width="14" height="18" fill="#9aa1a1"/>

  <!-- bottom: dirt-brown blocks -->
  <rect x="26" y="88" width="18" height="18" fill="#7d5c3c"/>
  <rect x="48" y="88" width="18" height="18" fill="#6c4f33"/>

  <!-- magnifier handle -->
  <rect x="60" y="60" width="14" height="40" rx="7" transform="rotate(-45 67 80)" fill="#383f4d"/>

  <!-- magnifier lens: dark frame + light-blue glass -->
  <rect x="28" y="28" width="48" height="48" rx="6" fill="#383f4d"/>
  <rect x="37" y="37" width="30" height="30" rx="2" fill="#d3e8f7"/>
</svg>
